<html>
<head>
    <title>JSONP</title>
    <script type="text/javascript" src="http://code.jquery.com/jquery-1.8.3.min.js"></script>
    <script type="text/javascript">
        jQuery(document).ready(function () {
            $.ajax({
                type: "get",
                async: false,
                // test url
                url: "http://127.0.0.1:8983/luoji/userdata.php",
                dataType: "jsonp",
                jsonp: "callback",
                jsonpCallback: "callback",
                success: function (res) {
                    $('#result').val(JSON.stringify(res));
                },
                error: function () {
                    alert('fail');
                }
            });
        });
    </script>
</head>
<body>
<textarea rows="" cols="" id="result" style="width:100%;height:768px;"></textarea>
</body>
</html>
